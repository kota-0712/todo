
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ログイン</title>
</head>
<body>
    <h1>ログイン</h1>
    <form th:action="@{/login}" method="post">
        <div>
            <label>ユーザー名：<input type="text" name="username"></label>
        </div>
        <div>
            <label>パスワード：<input type="password" name="password"></label>
        </div>
        <div>
            <button type="submit">ログイン</button>
			<div>
			    <a href="/tasks/api">APIでログイン（タスク一覧JSON）</a>
			</div>
        </div>
        <p th:if="${param.error}" style="color:red">ユーザー名またはパスワードが間違っています</p>
    </form>
    <a href="/register">ユーザー登録はこちら</a>
</body>
</html>
