<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>タスク一覧</title>
</head>
<body>
    <h1>ToDoリスト</h1>

    <a href="/tasks/new">登録</a>
    <form th:action="@{/logout}" method="post" style="display:inline">
        <button type="submit">ログアウト</button>
    </form>

    <p th:if="${#lists.isEmpty(tasks)}">タスクが登録されていません。</p>

    <table border="1" th:if="${!#lists.isEmpty(tasks)}">
        <tr>
            <th>ID</th>
            <th>タイトル</th>
            <th>内容</th>
            <th>名前</th>
            <th>開始日</th>
            <th>終了日</th>
            <th>作成日時</th>
            <th>更新日時</th>
            <th>操作</th>
        </tr>
        <tr th:each="task : ${tasks}" th:object="${task}">
            <td th:text="*{id}"></td>
            <td th:text="*{title}"></td>
            <td th:text="*{content}"></td>
            <td th:text="*{name}"></td>
            <td th:text="*{startDate}"></td>
            <td th:text="*{endDate}"></td>
            <td th:text="${#temporals.format(task.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
            <td th:text="${#temporals.format(task.updatedAt, 'yyyy-MM-dd HH:mm')}"></td>
            <td>
                <a th:href="@{/tasks/edit/{id}(id=*{id})}">編集</a>
                <form th:action="@{/tasks/delete/{id}(id=*{id})}" method="post" style="display:inline">
                    <button type="submit">削除</button>
                </form>
            </td>
        </tr>
    </table>
</body>
</html>
